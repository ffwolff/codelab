<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CodeLab</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <header>

        <h1>CodeLab</h1>

        <button
            id="matrix-btn"
            class="tab"
            onclick="toggleMatrixMode(this)"
        >
            Matrix: OFF
        </button>

    </header>

    <main class="layout">

        <aside class="sidebar">
            <div class="sidebar-section">
                <h3>Funções</h3>
                <div id="menu-funcoes"></div>
            </div>
        </aside>

        <section class="content">

            <section class="card">

                <div class="demo">

                    <h2 id="titulo-funcao"></h2>

                    <p id="descricao-funcao"></p>

                    <div id="inputs-container"></div>

                    <div id="actions-container"></div>

                    <p id="resultado">
                        Resultado aparecerá aqui
                    </p>

                </div>

                <div class="code">

                    <div class="code-header">

                        <span class="code-title">
                            Código Fonte
                        </span>

                        <div class="language-selector">

                            <button
                                class="tab active"
                                onclick="trocarLinguagem('js', this)"
                            >
                                JavaScript
                            </button>

                            <button
                                class="tab"
                                onclick="trocarLinguagem('java', this)"
                            >
                                Java
                            </button>

                            <button
                                class="tab"
                                onclick="trocarLinguagem('python', this)"
                            >
                                Python
                            </button>

                        </div>

                    </div>

                    <div class="code-content">

                        <pre id="codigo"></pre>

                    </div>

                </div>

            </section>

        </section>

    </main>

    <script src="js/app.js"></script>

</body>

</html>
